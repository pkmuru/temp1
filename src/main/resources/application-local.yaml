# ---------------------------------------------------------------------------
# 'local' profile — developer convenience overrides.
# Activate with:  --spring.profiles.active=local   (or SPRING_PROFILES_ACTIVE=local)
#
# Enables Spring Boot DevTools (auto-restart + LiveReload), full actuator exposure
# and verbose logging (including R2DBC SQL + bind parameters). Never activate in prod.
#
# NOTE: DevTools auto-restart/LiveReload only run when the app is started from an
# exploded classpath (IDE or `mvn spring-boot:run`). It is automatically disabled when
# running a fully packaged jar (`java -jar`); the verbose logging below still applies.
# ---------------------------------------------------------------------------
spring:
  devtools:
    add-properties: true
    restart:
      enabled: true
    livereload:
      enabled: true

# Expose everything locally for debugging (health/metrics/env/beans/mappings/...).
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# Verbose development logging.
logging:
  level:
    root: INFO
    com.ubs.wma.aat: DEBUG
    # Spring Data / R2DBC plumbing
    org.springframework.r2dbc: DEBUG
    org.springframework.data.r2dbc: DEBUG
    # Executed SQL and bind parameters from the r2dbc-postgresql driver
    io.r2dbc.postgresql.QUERY: DEBUG
    io.r2dbc.postgresql.PARAM: DEBUG
    # Reactive web request/response mapping
    org.springframework.web: DEBUG
    org.springframework.http.server.reactive: DEBUG
    # Azure Identity token acquisition (handy when debugging passwordless auth)
    com.azure.identity: DEBUG
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5p) %clr([%t]){faint} %clr(%-40.40logger{39}){cyan} : %m%n"
