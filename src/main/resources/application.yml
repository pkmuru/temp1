# =============================================================================
# application.yml — safe BASE defaults shared by every environment.
# Environment specifics live in the profile files:
#   application-local.yml  -> local dev against a local PostgreSQL (passwordless OFF)
#   application-dev.yml    -> Azure-hosted dev (Entra passwordless via UAMI)
#   application-test.yml   -> tests, embedded local PostgreSQL (src/test/resources)
# Activate with SPRING_PROFILES_ACTIVE=local|dev  (tests activate 'test' themselves).
# =============================================================================
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: ramp-up-pack-service
  # Loads bootstrap.yaml first with lower precedence (classic bootstrap-style semantics).
  config:
    import: "optional:classpath:bootstrap.yaml"
  # The application NEVER runs SQL/DDL itself — schema is managed externally
  # (DBA / pipeline). Only the 'test' profile enables SQL init, against the
  # embedded test database.
  sql:
    init:
      mode: never

app:
  datasource:
    # Microsoft Entra ID passwordless DB auth (token used as password). Default ON;
    # the 'local' and 'test' profiles turn it off and use spring.r2dbc.* instead.
    passwordless-enabled: ${DB_PASSWORDLESS_ENABLED:true}
    host: ${DB_HOST:localhost}
    port: ${DB_PORT:5432}
    database: ${DB_NAME:rampup}
    # Entra DB principal: the UAMI/SPN name (or your AAD UPN) mapped to a PostgreSQL role.
    username: ${DB_USERNAME:}
    ssl-mode: ${DB_SSL_MODE:require}
    entra-scope: https://ossrdbms-aad.database.windows.net/.default
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  azure:
    credential:
      # SPN (all three set) > UAMI (client-id only) > DefaultAzureCredential chain
      # (Azure CLI login locally). See AzureCredentialConfig.
      tenant-id: ${AZURE_TENANT_ID:}
      client-id: ${AZURE_CLIENT_ID:}
      client-secret: ${AZURE_CLIENT_SECRET:}

  # StaatEmail: firm-wide email REST service, protected by Microsoft Entra ID.
  # The dedicated SPN below authenticates via the OAuth2 client-credentials flow
  # (MSAL); when unset, the app's shared Azure credential is used (local dev).
  staatemail:
    base-url: ${STAATEMAIL_BASE_URL:http://localhost:9090}
    # client-credentials scope of the StaatEmail Entra app registration
    scope: ${STAATEMAIL_SCOPE:api://CHANGE-ME/.default}
    tenant-id: ${STAATEMAIL_TENANT_ID:}
    client-id: ${STAATEMAIL_CLIENT_ID:}
    client-secret: ${STAATEMAIL_CLIENT_SECRET:}
    # Sender identity stamped on every /sendEmail request.
    sender-gpn: ${STAATEMAIL_SENDER_GPN:}
    from-gpn: ${STAATEMAIL_FROM_GPN:}
    from-address: ${STAATEMAIL_FROM_ADDRESS:aat-delivery@ubs.com}
    sender-address: ${STAATEMAIL_SENDER_ADDRESS:aat-delivery@ubs.com}
    reply-to: ${STAATEMAIL_REPLY_TO:aat-delivery@ubs.com}
    application-name: ${STAATEMAIL_APPLICATION_NAME:AAT}
    # Dev troubleshooting: log every StaatEmail request/response (headers masked,
    # tokens never printed). Keep OFF outside dev.
    wiretap: ${STAATEMAIL_WIRETAP:false}

  # Email delivery: per-email attachment budget (35 MB Outlook limit -> splits
  # into "Part X of N" emails) and the automatic-retry window for failures.
  email:
    max-attachment-bytes: ${EMAIL_MAX_ATTACHMENT_BYTES:36700160}
    retry-window: ${EMAIL_RETRY_WINDOW:P7D}

  # Scheduler watching the email_batch table and retrying failed deliveries.
  # poll-interval is ISO-8601: PT1H = hourly, P1D = daily.
  scheduler:
    enabled: ${SCHEDULER_ENABLED:true}
    poll-interval: ${SCHEDULER_POLL_INTERVAL:PT1H}
    claim-limit: ${SCHEDULER_CLAIM_LIMIT:25}

# -----------------------------------------------------------------------------
# OpenAPI / Swagger UI (springdoc 3.x)
# -----------------------------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
    version: openapi_3_1
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# -----------------------------------------------------------------------------
# Actuator: health probes (liveness/readiness for k8s), info, metrics
# -----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    com.ubs.wma.aat: INFO
    org.springframework.r2dbc: INFO
