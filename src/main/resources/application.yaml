server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: ramp-up-pack-service
  # Loads bootstrap.yaml first with lower precedence (classic bootstrap-style semantics).
  config:
    import: "optional:classpath:bootstrap.yaml"
  # Used ONLY when app.datasource.passwordless-enabled=false. In tests these are
  # overridden by the Zonky embedded PostgreSQL (see AbstractIntegrationTest).
  # NEVER commit literal credentials here — supply them via environment variables,
  # e.g. DB_URL=r2dbc:postgresql://<host>:5432/<db>?sslMode=require DB_ADMIN_USERNAME=... DB_ADMIN_PASSWORD=...
  r2dbc:
    url: ${DB_URL:r2dbc:postgresql://localhost:5432/rampup}
    username: ${DB_ADMIN_USERNAME:}
    password: ${DB_ADMIN_PASSWORD:}
  # The application NEVER runs SQL/DDL itself — schema is managed externally
  # (DBA / pipeline / migration tooling). Only tests enable SQL init, against the
  # embedded test database (see AbstractIntegrationTest; schema.sql lives in src/test/resources).
  sql:
    init:
      mode: never

# ----------------------------------------------------------------------------
# Application-specific configuration
# ----------------------------------------------------------------------------
app:
  datasource:
    # Microsoft Entra ID passwordless DB auth (token used as password). Default ON.
    # Set to false (and provide spring.r2dbc.password) to run against a plain PostgreSQL.
    passwordless-enabled: ${DB_PASSWORDLESS_ENABLED:true}
    host: ${DB_HOST:localhost}
    port: ${DB_PORT:5432}
    database: ${DB_NAME:rampup}
    # Entra DB principal: the SPN / managed-identity name mapped to a PostgreSQL role.
    username: ${DB_USERNAME:}
    ssl-mode: ${DB_SSL_MODE:require}
    entra-scope: https://ossrdbms-aad.database.windows.net/.default
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  azure:
    credential:
      # When all three are present, an explicit SPN (ClientSecretCredential) is used;
      # otherwise DefaultAzureCredential (managed identity in Azure, env/CLI locally).
      tenant-id: ${AZURE_TENANT_ID:}
      client-id: ${AZURE_CLIENT_ID:}
      client-secret: ${AZURE_CLIENT_SECRET:}

  # StaatEmail: firm-wide email REST service (Entra/SPN-secured).
  staatemail:
    base-url: ${STAATEMAIL_BASE_URL:http://localhost:9090}
    # client-credentials scope of the StaatEmail Entra app registration
    scope: ${STAATEMAIL_SCOPE:api://CHANGE-ME/.default}

# ----------------------------------------------------------------------------
# OpenAPI / Swagger UI (springdoc 3.x)
# ----------------------------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
    version: openapi_3_1
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# ----------------------------------------------------------------------------
# Actuator: health probes (liveness/readiness for k8s), info, metrics
# ----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    com.ubs.wma.aat: INFO
    org.springframework.r2dbc: INFO

---
# ----------------------------------------------------------------------------
# 'azure-db' profile — run against the Azure dev database with admin credentials
# (passwordless OFF). Credentials come from the environment; nothing secret here.
# Activate with: SPRING_PROFILES_ACTIVE=azure-db DB_ADMIN_USERNAME=... DB_ADMIN_PASSWORD=...
# ----------------------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: azure-db

app:
  datasource:
    passwordless-enabled: false
